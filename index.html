<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Pro</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #3b1b1b;
            color: #f5f5f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            transition: background-color 0.5s ease;
        }

        /* --- CABECERA DINÁMICA --- */
        .cabecera-principal {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
            font-size: 32px;
            font-weight: bold;
            transition: color 0.3s ease;
        }

        .modo-estudio-header { color: #ff3d3d; }
        .modo-descanso-header { color: #4fc3f7; }

        .icono-cabecera {
            font-size: 36px;
            display: inline-block;
        }

        .contenedor-principal {
            display: flex;
            gap: 25px;
            max-width: 900px;
            width: 100%;
        }

        @media (max-width: 768px) {
            .contenedor-principal {
                flex-direction: column;
            }
        }

        .panel {
            background-color: #2d2d2d;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* --- PANEL IZQUIERDO --- */
        .lista-config-rutina {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 350px;
            overflow-y: auto;
            padding-right: 5px;
            margin-top: 10px;
        }

        .renglon-ciclo {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #3e3e42;
            padding: 10px 15px;
            border-radius: 8px;
            position: relative;
            transition: background-color 0.2s;
            min-height: 32px;
        }

        .renglon-ciclo:hover { background-color: #4a4a4f; }
        .info-lectura { display: flex; align-items: center; width: 100%; }
        .tipo-display { font-weight: bold; width: 110px; }
        .badge-estudio { color: #ff6b6b; }
        .badge-descanso { color: #4fc3f7; }

        .numero-lectura {
            font-family: monospace;
            font-size: 16px;
            font-weight: bold;
            color: #ffffff;
            background: transparent;
            border: none;
            text-align: right;
        }

        .etiqueta-min { font-size: 13px; color: #888; margin-left: 4px; margin-right: 8px; }

        .contenedor-edicion { display: flex; align-items: center; gap: 6px; width: 100%; }

        .select-tipo, .input-tiempo-edit {
            background-color: #252526;
            border: 1px solid #555;
            color: white;
            padding: 5px;
            border-radius: 4px;
            font-weight: bold;
        }
        .input-tiempo-edit { width: 40px; text-align: center; }

        .acciones-hover {
            display: none;
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
        }

        .renglon-ciclo:hover .acciones-hover { display: flex; }

        .btn-accion-item {
            border: none;
            padding: 5px 10px;
            font-size: 11px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            color: white;
        }
        .btn-item-editar { background-color: #0288d1; }
        .btn-item-eliminar { background-color: #d32f2f; }
        .btn-item-guardar { background-color: #388e3c; }

        .btn-agregar-mas {
            background-color: #4fc3f7;
            color: #1e1e1e;
            border: none;
            width: 40px;
            height: 40px;
            font-size: 24px;
            font-weight: bold;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px auto 10px auto;
            transition: transform 0.2s, background-color 0.2s;
        }
        .btn-agregar-mas:hover { background-color: #81d4fa; transform: scale(1.1); }

        /* --- PANEL DERECHO --- */
        .pantalla-pomodoro { text-align: center; justify-content: space-between; }
        .fase-actual-texto { font-size: 13px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; margin: 0; }
        .estado-fase { font-size: 26px; font-weight: bold; text-transform: uppercase; color: #ffb74d; margin: 2px 0 10px 0; min-height: 35px; }
        .fase-siguiente-texto { font-size: 16px; color: #e0e0e0; font-weight: 600; margin: 0 0 15px 0; background-color: #232325; padding: 6px; border-radius: 6px; display: inline-block; }

        .temporizador {
            font-size: 86px;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            margin: 10px 0 25px 0;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
            letter-spacing: -2px;
        }

        .btn-control-principal {
            background-color: #4caf50;
            color: white;
            border: none;
            padding: 14px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: background 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .btn-control-principal:hover { background-color: #45a049; }
        .btn-reiniciar-fase { background-color: #fbc02d; color: #1e1e1e; margin-top: 10px; }
        .btn-reiniciar-fase:hover { background-color: #f9a825; }

        /* --- MENÚ DESPLEGABLE DE AJUSTES --- */
        .btn-desplegar-ajustes {
            background-color: #3e3e42;
            color: #e0e0e0;
            border: 1px solid #555;
            padding: 8px;
            font-size: 13px;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            font-weight: 600;
            transition: background-color 0.2s;
        }
        .btn-desplegar-ajustes:hover { background-color: #4a4a4f; }

        .contenedor-ajustes-alertas {
            max-height: 0;
            overflow: hidden;
            background-color: #232325;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            text-align: left;
            transition: max-height 0.3s ease-out, padding 0.3s ease-out, margin-top 0.3s ease-out;
            padding: 0 12px;
        }

        .contenedor-ajustes-alertas.abierto {
            max-height: 100px;
            padding: 12px;
            margin-top: 10px;
        }

        .opcion-ajuste {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 14px;
        }

        .opcion-ajuste input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .lista-vista-derecha {
            margin-top: 20px;
            background-color: #252526;
            padding: 15px;
            border-radius: 8px;
            text-align: left;
        }
        .lista-vista-derecha ol { margin: 0; padding-left: 20px; color: #aaa; }
        .lista-vista-derecha li { margin-bottom: 8px; cursor: pointer; transition: color 0.2s; }
        .lista-vista-derecha li:hover { color: #4fc3f7; }
        .item-activo { color: #4fc3f7 !important; font-weight: bold; }

        .btn-reiniciar { background-color: #555555; color: white; margin-top: 15px; }
        .btn-reiniciar:hover { background-color: #444444; }
    </style>
</head>
<body>

    <div id="cabecera-app" class="cabecera-principal modo-estudio-header">
        <span id="titulo-texto">Pomodoro</span>
        <span id="icono-fase" class="icono-cabecera">🍅</span>
    </div>

    <div class="contenedor-principal">
        
        <div class="panel">
            <div id="contenedor-renglones" class="lista-config-rutina"></div>
            <button class="btn-agregar-mas" onclick="crearNuevoRenglonDefecto()">+</button>
            <button class="btn-control-principal btn-reiniciar" onclick="reiniciarTodo()">Resetear Todo</button>
        </div>

            <div class="cabecera-fases">
                <p class="fase-actual-texto">Renglón Actual</p>

                <div id="etiqueta-siguiente" class="fase-siguiente-texto">Siguiente: -</div>
            </div>
